<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>TEPS 기출 구문</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6fb;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;display:flex;flex-direction:column;min-height:100vh;padding-bottom:72px}
/* 헤더 */
.hdr{background:#fff;padding:16px 16px 14px;position:sticky;top:0;z-index:100;border-bottom:1px solid #eef0f5}
.rtabs{display:flex;gap:6px}
.rtab{flex:1;padding:7px 4px;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#f0f2f8;color:#888;font-family:inherit}
.rtab.on{background:#1a1a2e;color:#fff}
.nbtn-num{flex:0 0 auto;min-width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#bbb;font-weight:500}
.prog{height:2px;background:#eef0f5}
.progbar{height:2px;background:linear-gradient(90deg,#4a7fd4,#7b4fd4);transition:width .3s;width:0}
/* 카드 */
#cardArea{flex:1;display:flex;flex-direction:column;align-items:center;padding:28px 16px 16px;justify-content:center}
.card{background:#fff;border-radius:28px;box-shadow:0 2px 20px rgba(0,0,0,.06);width:100%;display:flex;flex-direction:column;height:440px;position:relative}
.card-top{height:260px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px}
.card-src{font-size:11px;color:#ccc;margin-bottom:16px;text-align:center}
.card-rating{font-size:13px;margin-bottom:16px;letter-spacing:1px}
.card-pattern{font-size:24px;font-weight:800;color:#1a1a2e;line-height:1.35;letter-spacing:-.4px;text-align:center}
.card-bottom{flex:1;padding:16px 20px 20px;display:flex;flex-direction:column;gap:10px}
.meaning-toggle-bar{width:100%;min-height:52px;flex-shrink:0;border:none;background:#f0f2f8;border-radius:14px;cursor:pointer;font-family:inherit;font-size:15px;color:#333;line-height:1.6;padding:14px 18px;display:flex;align-items:center;justify-content:center;text-align:center}
.card-action-row{display:flex;justify-content:flex-end;gap:10px;margin-top:auto}
.fav-btn{width:52px;height:52px;border-radius:16px;border:1.5px solid #eee;background:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.fav-btn.on{border-color:#f5a623;background:#fff9ee}
.tts-btn{width:52px;height:52px;border-radius:16px;border:1.5px solid #eee;background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
/* nav */
.navbtns{display:flex;gap:10px;width:100%;margin-top:14px}
.nbtn-sm{width:68px;height:52px;border:none;border-radius:16px;font-size:20px;cursor:pointer;background:#fff;color:#333;box-shadow:0 2px 12px rgba(0,0,0,.07);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nbtn-lg{flex:1;height:52px;border:none;border-radius:16px;font-size:22px;cursor:pointer;background:linear-gradient(135deg,#4a7fd4,#7b4fd4);color:#fff;box-shadow:0 6px 20px rgba(100,80,200,.25);font-weight:700;display:flex;align-items:center;justify-content:center}
.card-num{text-align:center;font-size:12px;color:#bbb;margin-top:10px}
/* 검색 팝업 */
.search-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding-top:80px}
.search-overlay.on{display:flex}
.search-sheet{background:#fff;border-radius:20px;padding:20px 16px 16px;width:calc(100% - 32px);max-width:440px}
.search-sheet input{width:100%;padding:13px 16px;border:1.5px solid #eaecf5;border-radius:14px;font-size:15px;font-family:inherit;outline:none;background:#f8f9fc}
.search-sheet input:focus{border-color:#7b4fd4;background:#fff}
.search-results{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto}
.sr-item{background:#f8f9fc;border-radius:12px;padding:13px 16px;cursor:pointer}
.sr-pat{font-size:14px;font-weight:700;color:#1a1a2e}
.sr-meaning{font-size:12px;color:#aaa;margin-top:2px}
.search-close{width:100%;padding:12px;background:none;border:none;font-size:14px;color:#bbb;cursor:pointer;font-family:inherit;margin-top:4px}
/* 퀴즈 */
#quizArea{flex:1;display:none;flex-direction:column;align-items:center;padding:16px}
.qcard{background:#fff;border-radius:24px;box-shadow:0 2px 20px rgba(0,0,0,.06);width:100%;padding:24px 22px 20px;margin-bottom:14px}
.qsrc{font-size:11px;color:#ccc;margin-bottom:12px}
.qsent{font-size:15px;color:#1a1a2e;line-height:1.85;font-weight:500}
.qblank{display:inline-block;border-bottom:2.5px solid #5a7fd4;min-width:80px;color:transparent;font-size:0;padding:0 4px;vertical-align:middle;height:20px}
.qtrans{display:none;font-size:13px;color:#888;margin-top:10px;line-height:1.6;border-top:1px solid #f0f0f0;padding-top:10px}
.choices{width:100%;display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.choice{background:#fff;border:1.5px solid #eaecf5;border-radius:14px;padding:14px 18px;font-size:14px;color:#333;text-align:left;cursor:pointer;font-family:inherit;font-weight:500;line-height:1.4}
.choice.ok{background:#edfaf3;border-color:#27ae60;color:#1a7a40;font-weight:700}
.choice.ng{background:#fef0f0;border-color:#e74c3c;color:#c0392b}
.choice.showok{background:#edfaf3;border-color:#27ae60;color:#1a7a40;font-weight:700}
.qnext{width:100%;padding:15px;background:linear-gradient(135deg,#4a7fd4,#7b4fd4);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:none}
.qnext.on{display:block}
.rbox{width:100%;background:#fff;border-radius:24px;padding:48px 24px;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,.06);display:none}
.rbox.on{display:block}
.rscore{font-size:56px;font-weight:800;color:#1a1a2e;margin-bottom:6px}
.rlabel{font-size:14px;color:#aaa;margin-bottom:32px}
.rrestart{padding:14px 36px;background:linear-gradient(135deg,#4a7fd4,#7b4fd4);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
/* 즐겨찾기 */
#favArea{flex:1;display:none;flex-direction:column;padding:12px 16px;gap:0}
.fav-header{display:flex;gap:8px;margin-bottom:12px}
.fav-toggle-all{background:#f0f2f8;border:none;color:#555;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit}
.fav-list{display:flex;flex-direction:column;gap:10px}
.fav-item{background:#fff;border-radius:16px;padding:16px 18px;box-shadow:0 2px 10px rgba(0,0,0,.05);position:relative}
.fav-pat{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:0;padding-right:28px;cursor:pointer}
.fav-meaning{font-size:13px;color:#aaa;margin-top:8px;display:none}
.fav-meaning.on{display:block}
.fav-del{position:absolute;top:14px;right:14px;background:none;border:none;color:#ddd;font-size:15px;cursor:pointer}
.fav-empty{text-align:center;color:#ccc;font-size:14px;padding:64px 0}
/* 하단 탭바 */
.btabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;display:flex;padding:10px 0 20px;border-top:1px solid #f0f0f5}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;color:#ccc;font-size:11px;font-weight:600;gap:3px}
.btab.on{color:#1a1a2e}
.btab-icon{font-size:20px}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,.82);color:#fff;font-size:13px;padding:9px 22px;border-radius:22px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:999;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body><button onclick="document.getElementById('dataModal').style.display='flex'" style="position:fixed; bottom:20px; right:16px; z-index:998; background:#4a6fa5; border:none; border-radius:99px; padding:10px 16px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; box-shadow:0 2px 8px rgba(0,0,0,.2);">백업</button>

  <div class="hdr">
    <div class="rtabs">
      <button class="rtab on" id="rt0" onclick="setRating(0)">전체</button>
      <button class="rtab" id="rt1" onclick="setRating(3)">★★★</button>
      <button class="rtab" id="rt2" onclick="setRating(2)">★★</button>

  <!-- 카드 모드 -->
  <div id="cardArea">

    <div class="navbtns">

  <!-- 퀴즈 모드 -->
  <div id="quizArea">

  <!-- 즐겨찾기 -->
  <div id="favArea">
    <div class="fav-header">
      <button class="fav-toggle-all" onclick="favShowAll()">뜻 전체 보기</button>
      <button class="fav-toggle-all" onclick="favHideAll()">전체 숨기기</button>
    </div>
    <div id="favList"></div>
  </div>

  <div class="btabs">
    <div class="btab on" id="tab0" onclick="setTab(0)"><div class="btab-icon">📇</div>카드</div>
    <div class="btab" id="tab1" onclick="setTab(1)"><div class="btab-icon">&#9999;</div>퀴즈</div>
    <div class="btab" id="tab2" onclick="setTab(2)"><div class="btab-icon">★</div>즐겨찾기</div>
  </div>
</div>

<!-- 검색 팝업 -->
<div class="search-overlay" id="searchOverlay" onclick="closeSearch(event)">
  <div class="search-sheet">
    <input id="searchInput" type="text" placeholder="구문 또는 뜻 검색..." oninput="doSearch()">
    <div class="search-results" id="searchResults"></div>
    <button class="search-close" onclick="toggleSearch()">닫기</button>
  </div>
</div>

var ci=0,dlist=[],favs=new Set(),curRating=0,curTab=0;
var qlist=[],qi=0,qscore=0,qAnswered=false;

function stars(n){return n===3?'★★★':n===2?'★★':'★';}

function loadStorage(){
  try{var f=localStorage.getItem('teps_phr2_favs');if(f)favs=new Set(JSON.parse(f));}catch(e){}
  try{var p=localStorage.getItem('teps_phr2_ci');if(p!=null){var n=parseInt(p);if(!isNaN(n))ci=n;}}catch(e){}
}
function saveFavs(){try{localStorage.setItem('teps_phr2_favs',JSON.stringify([...favs]));}catch(e){}}
function savePos(){try{localStorage.setItem('teps_phr2_ci',String(ci));}catch(e){}}

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function buildList(){
  dlist=curRating===0?DATA.slice():DATA.filter(function(d){return d.rating===curRating;});
  if(ci>=dlist.length)ci=0;
}

/* ── 등급 탭 ── */
function setRating(r){
  curRating=r;
  [0,3,2,1].forEach(function(v,i){
    document.getElementById('rt'+i).classList.toggle('on',v===r);
  });
  ci=0;buildList();
  if(curTab===0)renderCard();
  else if(curTab===1)startQuiz();
  else renderFavArea();
}

/* ── 카드 ── */
function renderCard(){
  if(!dlist.length){
    document.getElementById('cardPattern').textContent='카드 없음';
    document.getElementById('cardSrc').textContent='';
    document.getElementById('cardNum').textContent='';
    document.getElementById('progbar').style.width='0';
    return;
  }
  if(ci<0||ci>=dlist.length)ci=0;
  var d=dlist[ci];
  document.getElementById('cardSrc').textContent='출처: '+d.source;
  document.getElementById('cardPattern').textContent=d.pattern;
  var mt=document.getElementById('meaningToggle');
  mt.textContent='';mt.dataset.meaning=d.meaning;
  var fb=document.getElementById('favBtn');
  if(favs.has(d.pattern)){fb.innerHTML='&#9733;';fb.classList.add('on');}
  else{fb.innerHTML='&#9825;';fb.classList.remove('on');}
  document.getElementById('cardNum').textContent=(ci+1)+' / '+dlist.length;
  var pct=dlist.length>1?Math.round(ci/(dlist.length-1)*100):100;
  document.getElementById('progbar').style.width=pct+'%';
  savePos();
}

function toggleMeaning(){
  var btn=document.getElementById('meaningToggle');
  btn.textContent=btn.textContent?'':btn.dataset.meaning||'';
}
function prevCard(){if(!dlist.length)return;ci=(ci-1+dlist.length)%dlist.length;renderCard();}
function nextCard(){if(!dlist.length)return;ci=(ci+1)%dlist.length;renderCard();}
function toggleFav(){
  if(!dlist.length)return;
  var p=dlist[ci].pattern,fb=document.getElementById('favBtn');
  if(favs.has(p)){favs.delete(p);fb.innerHTML='&#9825;';fb.classList.remove('on');toast('즐겨찾기 해제');}
  else{favs.add(p);fb.innerHTML='&#9733;';fb.classList.add('on');toast('★ 즐겨찾기 추가');}
  saveFavs();
}

/* ── TTS ── */
function speakText(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  function go(){
    var u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';u.rate=0.9;
    var vs=speechSynthesis.getVoices(),prio=['Samantha','Alex','Karen','Daniel','Moira'];
    for(var p=0;p<prio.length;p++)for(var v=0;v<vs.length;v++)if(vs[v].name===prio[p]){u.voice=vs[v];break;}
    speechSynthesis.speak(u);
  }
  speechSynthesis.getVoices().length?go():(speechSynthesis.onvoiceschanged=function(){go();speechSynthesis.onvoiceschanged=null;});
}
function speakCurrent(){if(dlist.length)speakText(dlist[ci].pattern);}

function startQuiz(){
  qlist=shuffle(dlist.slice());qi=0;qscore=0;qAnswered=false;
  document.getElementById('qcard').style.display='block';
  document.getElementById('choices').style.display='flex';
  document.getElementById('qnext').classList.remove('on');
  document.getElementById('rbox').classList.remove('on');
  if(!qlist.length){document.getElementById('qcard').style.display='none';document.getElementById('rbox').classList.add('on');document.getElementById('rscore').textContent='0/0';document.getElementById('rlabel').textContent='카드가 없어요';return;}
  renderQuiz();
}
function renderQuiz(){
  if(qi>=qlist.length){showResult();return;}
  qAnswered=false;
  var d=qlist[qi];
  var pool=d.sentences||[{sentence:d.sentence,translation:d.translation,answer:d.answer}];
  var picked=pool[Math.floor(Math.random()*pool.length)];
  window._qcurrent=picked;
  document.getElementById('qSrc').textContent='출처: '+d.source;
  document.getElementById('qSent').innerHTML=picked.sentence.replace(/_+/g,'<span class="qblank"> </span>');
  var qt=document.getElementById('qTrans');qt.textContent='';qt.style.display='none';
  document.getElementById('qnext').classList.remove('on');
  var opts=shuffle(d.choices.slice());
  window._qopts=opts;
  document.getElementById('choices').innerHTML=opts.map(function(o,i){
    return '<button class="choice" onclick="doQuiz(this,'+i+')">'+'('+String.fromCharCode(97+i)+') '+o+'</button>';
  }).join('');
  var pct=qlist.length>1?Math.round(qi/(qlist.length-1)*100):100;
  document.getElementById('progbar').style.width=pct+'%';
}
function doQuiz(btn,idx){
  if(qAnswered)return;qAnswered=true;
  var opts=window._qopts,ans=window._qcurrent.answer,chosen=opts[idx];
  var btns=document.querySelectorAll('.choice');
  for(var i=0;i<btns.length;i++){if(opts[i]===ans)btns[i].classList.add(chosen===ans?'ok':'showok');}
  if(chosen===ans){btn.classList.add('ok');qscore++;}else btn.classList.add('ng');
  var qt=document.getElementById('qTrans');
  qt.textContent=window._qcurrent.translation;qt.style.display='block';
  document.getElementById('qnext').classList.add('on');
}
function nextQuiz(){qi++;renderQuiz();}
function showResult(){
  document.getElementById('qcard').style.display='none';
  document.getElementById('choices').style.display='none';
  document.getElementById('qnext').classList.remove('on');
  var total=qlist.length,pct=Math.round(qscore/total*100);
  document.getElementById('rscore').textContent=qscore+'/'+total;
  document.getElementById('rlabel').textContent=pct+'% — '+['다시 도전!','조금 더!','잘 하고 있어요!','훌륭해요!','완벽!'][Math.min(Math.floor(pct/25),4)];
  document.getElementById('rbox').classList.add('on');
  document.getElementById('progbar').style.width='100%';
}

/* ── 즐겨찾기 ── */
function renderFavArea(){
  var header=document.querySelector('.fav-header');
  var list=(curRating===0?DATA:DATA.filter(function(d){return d.rating===curRating;})).filter(function(d){return favs.has(d.pattern);});
  var listEl=document.getElementById('favList');
  if(!list.length){
    header.style.display='none';
    listEl.innerHTML='<div class="fav-empty">즐겨찾기가 없어요</div>';
    return;
  }
  header.style.display='flex';
  listEl.innerHTML='<div class="fav-list">'+list.map(function(d,i){
    window['_fd_'+i]=d.pattern;
    return '<div class="fav-item">'
      +'<button class="fav-del" onclick="removeFav(window[\'_fd_'+i+'\'])">✕</button>'
      +'<div class="fav-pat" onclick="toggleFavMeaning(this)">'+d.pattern+'</div>'
      +'<div class="fav-meaning">'+d.meaning+'</div>'
      +'</div>';
  }).join('')+'</div>';
}
function toggleFavMeaning(el){
  var m=el.nextElementSibling;
  m.classList.toggle('on');
}
function favShowAll(){
  document.querySelectorAll('.fav-meaning').forEach(function(el){el.classList.add('on');});
}
function favHideAll(){
  document.querySelectorAll('.fav-meaning').forEach(function(el){el.classList.remove('on');});
}
function removeFav(pat){favs.delete(pat);saveFavs();renderFavArea();}

/* ── 검색 ── */
function toggleSearch(){
  var ov=document.getElementById('searchOverlay');
  ov.classList.toggle('on');
  if(ov.classList.contains('on'))setTimeout(function(){document.getElementById('searchInput').focus();},100);
  else{document.getElementById('searchInput').value='';document.getElementById('searchResults').innerHTML='';}
}
function closeSearch(e){if(e.target===document.getElementById('searchOverlay'))toggleSearch();}
function doSearch(){
  var q=document.getElementById('searchInput').value.trim().toLowerCase();
  var res=document.getElementById('searchResults');
  if(!q){res.innerHTML='';return;}
  var hits=DATA.filter(function(d){return d.pattern.toLowerCase().includes(q)||d.meaning.includes(q);});
  if(!hits.length){res.innerHTML='<div style="font-size:13px;color:#bbb;padding:8px;text-align:center">결과 없음</div>';return;}
  res.innerHTML=hits.map(function(d,i){
    window['_sr_'+i]=d.pattern;
    return '<div class="sr-item" onclick="jumpTo(window[\'_sr_'+i+'\'])">'
      +'<div class="sr-pat">'+d.pattern+'</div>'
      +'<div class="sr-meaning">'+d.meaning+'</div></div>';
  }).join('');
}
function jumpTo(pattern){
  curRating=0;[0,1,2,3].forEach(function(i){document.getElementById('rt'+i).classList.toggle('on',i===0);});
  buildList();
  var idx=dlist.findIndex(function(x){return x.pattern===pattern;});
  if(idx>=0)ci=idx;
  setTab(0);toggleSearch();renderCard();
}

/* ── 하단 탭 ── */
function setTab(n){
  curTab=n;
  document.getElementById('cardArea').style.display=n===0?'flex':'none';
  document.getElementById('quizArea').style.display=n===1?'flex':'none';
  document.getElementById('favArea').style.display=n===2?'flex':'none';
  [0,1,2].forEach(function(i){document.getElementById('tab'+i).classList.toggle('on',i===n);});
  if(n===1)startQuiz();
  if(n===2)renderFavArea();
}

/* ── toast ── */
var _tt=null;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('on');},1800);
}

/* ── init ── */

function exportData327(){
  const data = JSON.stringify({favs: [...favs]});
  if(navigator.clipboard){
    navigator.clipboard.writeText(data).then(()=>alert('클립보드에 복사됐어요! 다른 기기에서 가져오기에 붙여넣으세요.'));
  } else {
    const ta = document.getElementById('importText327');
    ta.value = data;
    alert('위 텍스트를 복사하세요!');
  }
}
function importData327(){
  try {
    const text = document.getElementById('importText327').value.trim();
    const data = JSON.parse(text);
    if(data.favs && Array.isArray(data.favs)){
      favs = new Set(data.favs);
      saveFavs();
      alert('즐겨찾기 ' + favs.size + '개를 가져왔어요!');
      document.getElementById('dataModal').style.display='none';
      renderCards();
    } else {
      alert('올바른 형식이 아니에요.');
    }
  } catch(e) {
    alert('올바른 형식이 아니에요.');
  }
}

loadStorage();buildList();renderCard();
</script>
